<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figma slideshow — fading slides in MacBook mockup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="stage">
      <header>
        <p class="eyebrow">Group A</p>
        <h2>Slides 1 — 3</h2>
      </header>

      <div class="mockup">
        <div class="screen">
          <div class="slideshow slideshow--a">
            <img class="slide" src="images/slide1.png" alt="Slide 1" />
            <img class="slide" src="images/slide2.png" alt="Slide 2" />
            <img class="slide" src="images/slide3.png" alt="Slide 3" />
          </div>
        </div>
        <img class="mockup__frame" src="images/mockup.png" alt="" aria-hidden="true" />
      </div>
    </section>

    <section class="stage">
      <header>
        <p class="eyebrow">Group B</p>
        <h2>Slides 4 — 7</h2>
      </header>

      <div class="mockup">
        <div class="screen">
          <div class="slideshow slideshow--b">
            <img class="slide" src="images/slide4.png" alt="Slide 4" />
            <img class="slide" src="images/slide5.png" alt="Slide 5" />
            <img class="slide" src="images/slide6.png" alt="Slide 6" />
            <img class="slide" src="images/slide7.png" alt="Slide 7" />
          </div>
        </div>
        <img class="mockup__frame" src="images/mockup.png" alt="" aria-hidden="true" />
      </div>
    </section>
  </main>
</body>
</html>
