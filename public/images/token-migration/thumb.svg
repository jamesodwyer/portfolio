<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2824 1608" width="2824" height="1608">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="2824" height="1608" fill="url(#bg)"/>

  <!-- Token architecture - three layers -->

  <!-- Layer 1: Foundation -->
  <rect x="200" y="900" width="2424" height="320" rx="16" fill="#111111" stroke="#FFE500" stroke-width="3"/>
  <text x="280" y="960" fill="#FFE500" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">FOUNDATION</text>
  <text x="280" y="996" fill="#888888" font-family="system-ui, sans-serif" font-size="20">Core colours · Typography · Spacing · Elevation</text>

  <!-- Foundation token samples -->
  <g transform="translate(280,1030)">
    <rect width="100" height="40" rx="6" fill="#026CDF"/>
    <rect x="120" width="100" height="40" rx="6" fill="#1DB954"/>
    <rect x="240" width="100" height="40" rx="6" fill="#FF5722"/>
    <rect x="360" width="100" height="40" rx="6" fill="#FFE500"/>
    <rect x="480" width="100" height="40" rx="6" fill="#9C27B0"/>
    <rect x="600" width="100" height="40" rx="6" fill="#ffffff"/>
    <rect x="720" width="100" height="40" rx="6" fill="#333333"/>
    <rect x="840" width="100" height="40" rx="6" fill="#666666"/>
  </g>

  <g transform="translate(280,1090)">
    <text x="0" y="20" fill="#666666" font-family="monospace" font-size="14">color.blue.500</text>
    <text x="120" y="20" fill="#666666" font-family="monospace" font-size="14">color.green.500</text>
    <text x="240" y="20" fill="#666666" font-family="monospace" font-size="14">color.red.500</text>
    <text x="360" y="20" fill="#666666" font-family="monospace" font-size="14">color.yellow.500</text>
    <text x="480" y="20" fill="#666666" font-family="monospace" font-size="14">color.purple.500</text>
    <text x="600" y="20" fill="#666666" font-family="monospace" font-size="14">color.white</text>
    <text x="720" y="20" fill="#666666" font-family="monospace" font-size="14">color.gray.800</text>
    <text x="840" y="20" fill="#666666" font-family="monospace" font-size="14">color.gray.500</text>
  </g>

  <!-- Spacing tokens -->
  <g transform="translate(1600,1030)">
    <rect width="16" height="40" rx="2" fill="#FFE500" opacity="0.3"/>
    <rect x="32" width="32" height="40" rx="2" fill="#FFE500" opacity="0.4"/>
    <rect x="80" width="48" height="40" rx="2" fill="#FFE500" opacity="0.5"/>
    <rect x="144" width="64" height="40" rx="2" fill="#FFE500" opacity="0.6"/>
    <rect x="224" width="96" height="40" rx="2" fill="#FFE500" opacity="0.7"/>
    <rect x="336" width="128" height="40" rx="2" fill="#FFE500" opacity="0.8"/>
    <rect x="480" width="192" height="40" rx="2" fill="#FFE500" opacity="0.9"/>
  </g>
  <text x="1600" y="1106" fill="#666666" font-family="monospace" font-size="14">space.xs  space.sm  space.md  space.lg  space.xl  space.2xl  space.3xl</text>

  <!-- Layer 2: Semantic -->
  <rect x="350" y="520" width="2124" height="300" rx="16" fill="#111111" stroke="#FFE500" stroke-width="2" opacity="0.8"/>
  <text x="430" y="580" fill="#FFE500" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">SEMANTIC</text>
  <text x="430" y="616" fill="#888888" font-family="system-ui, sans-serif" font-size="20">Component-specific tokens · Product libraries</text>

  <!-- Semantic token examples -->
  <g transform="translate(430,650)">
    <rect width="280" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="20" y="32" fill="#FFE500" font-family="monospace" font-size="16">button.bg.primary</text>

    <rect x="300" width="280" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="320" y="32" fill="#FFE500" font-family="monospace" font-size="16">text.color.muted</text>

    <rect x="600" width="280" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="620" y="32" fill="#FFE500" font-family="monospace" font-size="16">card.border.radius</text>

    <rect x="900" width="280" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="920" y="32" fill="#FFE500" font-family="monospace" font-size="16">input.bg.default</text>

    <rect x="1200" width="280" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="1220" y="32" fill="#FFE500" font-family="monospace" font-size="16">nav.height.mobile</text>
  </g>

  <!-- Connection lines: Semantic → Foundation -->
  <line x1="600" y1="820" x2="500" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="900" y1="820" x2="800" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1200" y1="820" x2="1100" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1500" y1="820" x2="1400" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1800" y1="820" x2="1700" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="2100" y1="820" x2="2000" y2="900" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>

  <!-- Layer 3: Brand -->
  <rect x="500" y="160" width="1824" height="280" rx="16" fill="#111111" stroke="#FFE500" stroke-width="2" opacity="0.6"/>
  <text x="580" y="220" fill="#FFE500" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">BRAND</text>
  <text x="580" y="256" fill="#888888" font-family="system-ui, sans-serif" font-size="20">Client-specific theming · White-label configuration</text>

  <!-- Brand variants -->
  <g transform="translate(580,280)">
    <rect width="240" height="120" rx="10" fill="#026CDF" opacity="0.3" stroke="#026CDF" stroke-width="2"/>
    <text x="120" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Ticketmaster</text>
    <text x="120" y="78" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.7">Corporate</text>

    <rect x="270" width="240" height="120" rx="10" fill="#1DB954" opacity="0.3" stroke="#1DB954" stroke-width="2"/>
    <text x="390" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Sports XR</text>
    <text x="390" y="78" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.7">Variant</text>

    <rect x="540" width="240" height="120" rx="10" fill="#FF5722" opacity="0.3" stroke="#FF5722" stroke-width="2"/>
    <text x="660" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Tournament</text>
    <text x="660" y="78" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.7">White Label</text>

    <rect x="810" width="240" height="120" rx="10" fill="#9C27B0" opacity="0.3" stroke="#9C27B0" stroke-width="2"/>
    <text x="930" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Club Client</text>
    <text x="930" y="78" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.7">300+ clients</text>

    <rect x="1080" width="240" height="120" rx="10" fill="#333333" stroke="#666666" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="1200" y="50" fill="#888888" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">+ More</text>
    <text x="1200" y="78" fill="#666666" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">Extensible</text>
  </g>

  <!-- Connection lines: Brand → Semantic -->
  <line x1="800" y1="440" x2="700" y2="520" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1100" y1="440" x2="1000" y2="520" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1400" y1="440" x2="1300" y2="520" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="1700" y1="440" x2="1600" y2="520" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>
  <line x1="2000" y1="440" x2="1900" y2="520" stroke="#FFE500" stroke-width="1.5" opacity="0.2"/>

  <!-- Layer labels on left -->
  <text x="160" y="310" fill="#333333" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" transform="rotate(-90,160,310)">CUSTOMISATION</text>
  <text x="160" y="680" fill="#333333" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" transform="rotate(-90,160,680)">FLEXIBILITY</text>
  <text x="160" y="1060" fill="#333333" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" transform="rotate(-90,160,1060)">CONSISTENCY</text>

  <!-- Bottom stats -->
  <text x="280" y="1340" fill="#FFE500" font-family="system-ui, sans-serif" font-size="48" font-weight="900">33+</text>
  <text x="280" y="1370" fill="#666666" font-family="system-ui, sans-serif" font-size="16">Misuses fixed</text>

  <text x="580" y="1340" fill="#FFE500" font-family="system-ui, sans-serif" font-size="48" font-weight="900">3</text>
  <text x="580" y="1370" fill="#666666" font-family="system-ui, sans-serif" font-size="16">Token layers</text>

  <text x="780" y="1340" fill="#FFE500" font-family="system-ui, sans-serif" font-size="48" font-weight="900">8</text>
  <text x="780" y="1370" fill="#666666" font-family="system-ui, sans-serif" font-size="16">Products unblocked</text>

  <text x="1080" y="1340" fill="#FFE500" font-family="system-ui, sans-serif" font-size="48" font-weight="900">300+</text>
  <text x="1080" y="1370" fill="#666666" font-family="system-ui, sans-serif" font-size="16">Potential clients</text>
</svg>