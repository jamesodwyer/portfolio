    <style>
      /* Embedded-in-portfolio overrides */
      /* The dev-preview wrapper around .gdsi adds inline padding:24px; zero it
         so the demo's frame meets the iframe edges and is centred in it. */
      #root > div { padding: 0 !important; }
      /* width:100% + content-box on the demo root causes it to overflow the
         iframe by its 32px horizontal padding; border-box keeps it inside. */
      ._root_1bzg8_1 { box-sizing: border-box !important; padding: 16px 16px 24px !important; }
      ._header_1bzg8_18 { margin-bottom: 16px !important; }
      ._chips_1bzg8_62 { margin: 0 -16px 16px !important; padding: 12px 16px !important; }
      ._pipeline_1bzg8_135 { scrollbar-width: none !important; padding-bottom: 4px !important; }
      ._pipeline_1bzg8_135::-webkit-scrollbar { display: none !important; }
    </style>
    <script>
      // Report the demo root's height to the parent so the embedding iframe
      // can size itself to its content. Without this, the iframe has a fixed
      // height and shows the body bg as empty gray below the carousel controls.
      (function () {
        if (window.parent === window) return;
        var observer = null;
        function postHeight() {
          var root = document.querySelector('.gdsi');
          if (!root) return;
          var h = Math.ceil(root.getBoundingClientRect().height);
          if (h > 0) window.parent.postMessage({ type: 'gdsi-resize', height: h }, '*');
        }
        function tryAttach() {
          var root = document.querySelector('.gdsi');
          if (!root) return false;
          postHeight();
          if ('ResizeObserver' in window && !observer) {
            observer = new ResizeObserver(postHeight);
            observer.observe(root);
          }
          if (document.fonts && document.fonts.ready) document.fonts.ready.then(postHeight);
          return true;
        }
        function start() {
          if (tryAttach()) return;
          var attempts = 0;
          var timer = setInterval(function () {
            attempts++;
            if (tryAttach() || attempts >= 60) clearInterval(timer);
          }, 50);
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
        else start();
      })();
    </script>
  </head>
